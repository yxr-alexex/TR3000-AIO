name: Build OpenWrt for TR3000

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: openwrt-25.05
  CONFIG_FILE: config/tr3000.config

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Runner Information
        run: |
          echo "=== Runner ==="
          uname -a
          lscpu
          free -h
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3 python3-distutils rsync unzip zlib1g-dev \
            file wget curl cmake ninja-build ccache jq

      - name: Clone OpenWrt
        run: |
          git clone --depth=1 -b ${REPO_BRANCH} ${REPO_URL} openwrt

      - name: Show OpenWrt Version
        run: |
          cd openwrt
          cat include/version.mk